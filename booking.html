<html lang="en">

</head>
<body>

<header>
    <h1>UWI Gym Portal</h1>
    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="login.html">Login</a>
        <a href="booking.html">Booking</a>
        <a href="contact.html">Contact</a>
    </nav>
</header>

<section class="hero">
    <h2>Equipment Booking</h2>
    <p>Reserve gym equipment quickly and efficiently.</p>
</section>

<section class="features">

<div class="card" style="width:500px;">

<form>

<label>Full Name</label><br><br>
<input type="text" placeholder="Enter Full Name" style="width:100%; padding:10px;"><br><br>

<label>Membership Type</label><br><br>
<select style="width:100%; padding:10px;">
<option>Student</option>
<option>Staff</option>
<option>Faculty</option>
</select><br><br>

<label>Select Equipment</label><br><br>
<select style="width:100%; padding:10px;">
<option>Treadmill</option>
<option>Smith Machine</option>
<option>Spin Bike</option>
<option>Leg Press</option>
<option>Elliptical Bike</option>
</select><br><br>

<label>Select Date</label><br><br>
<input type="date" style="width:100%; padding:10px;"><br><br>

<label>Select Time</label><br><br>
<input type="time" style="width:100%; padding:10px;"><br><br>

<button class="btn" style="border:none; cursor:pointer;">Submit Booking</button>

</form>

</div>

</section>

<footer>
<p>The University of the West Indies © 2026</p>
</footer>

</body>
</html>
